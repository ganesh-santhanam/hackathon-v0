<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1100" viewBox="0 0 1700 1100" role="img" aria-labelledby="title desc">
  <title id="title">AWS and Industry-Standard Enterprise Architecture</title>
  <desc id="desc">Production reference architecture and future scale path for the Industrial AI Investigation Assistant on AWS and industry-standard services.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title{font:700 40px Arial, Helvetica, sans-serif;fill:#0F172A}
      .subtitle{font:400 19px Arial, Helvetica, sans-serif;fill:#475569}
      .layer-title{font:700 18px Arial, Helvetica, sans-serif;fill:#0F172A}
      .box-title{font:700 16px Arial, Helvetica, sans-serif;fill:#0F172A}
      .box-text{font:400 13px Arial, Helvetica, sans-serif;fill:#475569}
      .note{font:700 14px Arial, Helvetica, sans-serif;fill:#7C2D12}
      .small{font:400 12px Arial, Helvetica, sans-serif;fill:#64748B}
      .arrow{stroke:#475569;stroke-width:2.3;fill:none;marker-end:url(#arrow)}
      .dashed{stroke:#64748B;stroke-width:2;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1700" height="1100" fill="url(#bg)"/>
  <text x="70" y="70" class="title">AWS / Industry-Standard Enterprise Architecture</text>
  <text x="72" y="108" class="subtitle">Production reference architecture / future scale path. This is not required for the local-first v0 demo.</text>
  <rect x="1270" y="52" width="360" height="48" rx="24" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="1450" y="82" text-anchor="middle" class="note">Future path: AWS + MI300 + LoRA-ready</text>

  <g id="users" transform="translate(60,145)">
    <rect width="1580" height="100" rx="22" fill="#EAF6FF" stroke="#93C5FD" filter="url(#softShadow)"/>
    <text x="24" y="32" class="layer-title">1. User / Operations Layer</text>
    <g transform="translate(265,23)">
      <rect width="180" height="54" rx="14" fill="#FFFFFF" stroke="#BFDBFE"/><text x="90" y="24" text-anchor="middle" class="box-title">Operators</text><text x="90" y="43" text-anchor="middle" class="box-text">shop-floor decisions</text>
    </g>
    <g transform="translate(470,23)">
      <rect width="220" height="54" rx="14" fill="#FFFFFF" stroke="#BFDBFE"/><text x="110" y="24" text-anchor="middle" class="box-title">Maintenance engineers</text><text x="110" y="43" text-anchor="middle" class="box-text">diagnosis + repair</text>
    </g>
    <g transform="translate(715,23)">
      <rect width="165" height="54" rx="14" fill="#FFFFFF" stroke="#BFDBFE"/><text x="82" y="24" text-anchor="middle" class="box-title">Managers</text><text x="82" y="43" text-anchor="middle" class="box-text">risk overview</text>
    </g>
    <g transform="translate(970,23)">
      <rect width="195" height="54" rx="14" fill="#FFFFFF" stroke="#BFDBFE"/><text x="98" y="24" text-anchor="middle" class="box-title">Streamlit / Web App</text><text x="98" y="43" text-anchor="middle" class="box-text">operator experience</text>
    </g>
    <g transform="translate(1200,23)">
      <rect width="200" height="54" rx="14" fill="#FFFFFF" stroke="#BFDBFE"/><text x="100" y="24" text-anchor="middle" class="box-title">API Gateway / ALB</text><text x="100" y="43" text-anchor="middle" class="box-text">edge routing</text>
    </g>
  </g>

  <g id="app" transform="translate(60,275)">
    <rect width="1580" height="105" rx="22" fill="#ECFDF3" stroke="#86EFAC" filter="url(#softShadow)"/>
    <text x="24" y="34" class="layer-title">2. Application Layer</text>
    <g transform="translate(300,24)">
      <rect width="230" height="58" rx="14" fill="#FFFFFF" stroke="#BBF7D0"/><text x="115" y="25" text-anchor="middle" class="box-title">FastAPI Investigation API</text><text x="115" y="45" text-anchor="middle" class="box-text">request + evidence contract</text>
    </g>
    <g transform="translate(570,24)">
      <rect width="230" height="58" rx="14" fill="#FFFFFF" stroke="#BBF7D0"/><text x="115" y="25" text-anchor="middle" class="box-title">LangGraph Agent Service</text><text x="115" y="45" text-anchor="middle" class="box-text">multi-agent orchestration</text>
    </g>
    <g transform="translate(840,24)">
      <rect width="190" height="58" rx="14" fill="#FFFFFF" stroke="#BBF7D0"/><text x="95" y="25" text-anchor="middle" class="box-title">Approval Service</text><text x="95" y="45" text-anchor="middle" class="box-text">human decisions</text>
    </g>
    <g transform="translate(1070,24)">
      <rect width="175" height="58" rx="14" fill="#FFFFFF" stroke="#BBF7D0"/><text x="88" y="25" text-anchor="middle" class="box-title">Policy Service</text><text x="88" y="45" text-anchor="middle" class="box-text">severity rules</text>
    </g>
  </g>

  <g id="async" transform="translate(60,410)">
    <rect width="760" height="125" rx="22" fill="#FFF7ED" stroke="#FDBA74" filter="url(#softShadow)"/>
    <text x="24" y="34" class="layer-title">3. Async Processing Layer</text>
    <g transform="translate(230,36)">
      <rect width="190" height="58" rx="14" fill="#FFFFFF" stroke="#FED7AA"/><text x="95" y="25" text-anchor="middle" class="box-title">SQS Jobs</text><text x="95" y="45" text-anchor="middle" class="box-text">investigation queue</text>
    </g>
    <g transform="translate(450,36)">
      <rect width="230" height="58" rx="14" fill="#FFFFFF" stroke="#FED7AA"/><text x="115" y="25" text-anchor="middle" class="box-title">ECS / Fargate Workers</text><text x="115" y="45" text-anchor="middle" class="box-text">parallel investigations</text>
    </g>
    <text x="24" y="100" class="small">Optional EKS only when orchestration complexity justifies it.</text>
  </g>

  <g id="stream" transform="translate(880,410)">
    <rect width="760" height="125" rx="22" fill="#F5F3FF" stroke="#C4B5FD" filter="url(#softShadow)"/>
    <text x="24" y="34" class="layer-title">4. Streaming Layer</text>
    <g transform="translate(230,36)">
      <rect width="205" height="58" rx="14" fill="#FFFFFF" stroke="#DDD6FE"/><text x="102" y="25" text-anchor="middle" class="box-title">Kinesis / MSK / Kafka</text><text x="102" y="45" text-anchor="middle" class="box-text">industrial event streams</text>
    </g>
    <g transform="translate(470,36)">
      <rect width="205" height="58" rx="14" fill="#FFFFFF" stroke="#DDD6FE"/><text x="102" y="25" text-anchor="middle" class="box-title">Flink / Spark</text><text x="102" y="45" text-anchor="middle" class="box-text">real-time features</text>
    </g>
  </g>

  <g id="ai" transform="translate(60,565)">
    <rect width="760" height="170" rx="22" fill="#EEF2FF" stroke="#A5B4FC" filter="url(#softShadow)"/>
    <text x="24" y="34" class="layer-title">5. AI / Model Layer</text>
    <g transform="translate(195,32)">
      <rect width="205" height="58" rx="14" fill="#FFFFFF" stroke="#C7D2FE"/><text x="102" y="24" text-anchor="middle" class="box-title">Model Gateway</text><text x="102" y="44" text-anchor="middle" class="box-text">router + fallback</text>
    </g>
    <g transform="translate(430,32)">
      <rect width="130" height="58" rx="14" fill="#FFFFFF" stroke="#C7D2FE"/><text x="65" y="24" text-anchor="middle" class="box-title">Bedrock</text><text x="65" y="44" text-anchor="middle" class="box-text">managed LLMs</text>
    </g>
    <g transform="translate(585,32)">
      <rect width="135" height="58" rx="14" fill="#FFFFFF" stroke="#C7D2FE"/><text x="68" y="24" text-anchor="middle" class="box-title">SageMaker</text><text x="68" y="44" text-anchor="middle" class="box-text">custom models</text>
    </g>
    <g transform="translate(195,100)">
      <rect width="250" height="48" rx="14" fill="#FFFFFF" stroke="#C7D2FE"/><text x="125" y="21" text-anchor="middle" class="box-title">MI300 / ROCm benchmark path</text><text x="125" y="39" text-anchor="middle" class="box-text">future acceleration comparison</text>
    </g>
    <g transform="translate(475,100)">
      <rect width="185" height="48" rx="14" fill="#FFFFFF" stroke="#C7D2FE"/><text x="92" y="21" text-anchor="middle" class="box-title">LoRA adapters</text><text x="92" y="39" text-anchor="middle" class="box-text">domain adaptation</text>
    </g>
  </g>

  <g id="memory" transform="translate(880,565)">
    <rect width="760" height="170" rx="22" fill="#F0FDFA" stroke="#5EEAD4" filter="url(#softShadow)"/>
    <text x="24" y="34" class="layer-title">6. Memory / Retrieval Layer</text>
    <g transform="translate(225,55)">
      <rect width="185" height="58" rx="14" fill="#FFFFFF" stroke="#99F6E4"/><text x="92" y="24" text-anchor="middle" class="box-title">Embeddings Service</text><text x="92" y="44" text-anchor="middle" class="box-text">evidence vectors</text>
    </g>
    <g transform="translate(445,55)">
      <rect width="150" height="58" rx="14" fill="#FFFFFF" stroke="#99F6E4"/><text x="75" y="24" text-anchor="middle" class="box-title">Qdrant</text><text x="75" y="44" text-anchor="middle" class="box-text">similar incidents</text>
    </g>
    <g transform="translate(625,55)">
      <rect width="100" height="58" rx="14" fill="#FFFFFF" stroke="#99F6E4"/><text x="50" y="24" text-anchor="middle" class="box-title">Vector</text><text x="50" y="44" text-anchor="middle" class="box-text">OpenSearch</text>
    </g>
  </g>

  <g id="data" transform="translate(60,765)">
    <rect width="980" height="180" rx="22" fill="#FEFCE8" stroke="#FDE68A" filter="url(#softShadow)"/>
    <text x="24" y="34" class="layer-title">7. Data Layer</text>
    <g transform="translate(205,35)">
      <rect width="160" height="58" rx="14" fill="#FFFFFF" stroke="#FEF08A"/><text x="80" y="24" text-anchor="middle" class="box-title">S3 Artifacts</text><text x="80" y="44" text-anchor="middle" class="box-text">images, docs, outputs</text>
    </g>
    <g transform="translate(395,35)">
      <rect width="190" height="58" rx="14" fill="#FFFFFF" stroke="#FEF08A"/><text x="95" y="24" text-anchor="middle" class="box-title">RDS Postgres</text><text x="95" y="44" text-anchor="middle" class="box-text">incidents, approvals, audit</text>
    </g>
    <g transform="translate(615,35)">
      <rect width="150" height="58" rx="14" fill="#FFFFFF" stroke="#FEF08A"/><text x="75" y="24" text-anchor="middle" class="box-title">S3 Lakehouse</text><text x="75" y="44" text-anchor="middle" class="box-text">historical data</text>
    </g>
    <g transform="translate(205,110)">
      <rect width="145" height="48" rx="14" fill="#FFFFFF" stroke="#FEF08A"/><text x="72" y="21" text-anchor="middle" class="box-title">Glue Catalog</text><text x="72" y="39" text-anchor="middle" class="box-text">metadata</text>
    </g>
    <g transform="translate(380,110)">
      <rect width="275" height="48" rx="14" fill="#FFFFFF" stroke="#FEF08A"/><text x="138" y="21" text-anchor="middle" class="box-title">Athena / Redshift / Snowflake</text><text x="138" y="39" text-anchor="middle" class="box-text">analytics and reporting</text>
    </g>
  </g>

  <g id="gov" transform="translate(1080,765)">
    <rect width="560" height="180" rx="22" fill="#FEE2E2" stroke="#FCA5A5" filter="url(#softShadow)"/>
    <text x="24" y="34" class="layer-title">8. Observability / Governance Layer</text>
    <g transform="translate(35,55)">
      <rect width="150" height="44" rx="12" fill="#FFFFFF" stroke="#FECACA"/><text x="75" y="27" text-anchor="middle" class="box-title">CloudWatch</text>
    </g>
    <g transform="translate(205,55)">
      <rect width="165" height="44" rx="12" fill="#FFFFFF" stroke="#FECACA"/><text x="82" y="27" text-anchor="middle" class="box-title">OpenTelemetry</text>
    </g>
    <g transform="translate(390,55)">
      <rect width="130" height="44" rx="12" fill="#FFFFFF" stroke="#FECACA"/><text x="65" y="27" text-anchor="middle" class="box-title">IAM / RBAC</text>
    </g>
    <g transform="translate(35,115)">
      <rect width="150" height="44" rx="12" fill="#FFFFFF" stroke="#FECACA"/><text x="75" y="27" text-anchor="middle" class="box-title">Secrets</text>
    </g>
    <g transform="translate(205,115)">
      <rect width="165" height="44" rx="12" fill="#FFFFFF" stroke="#FECACA"/><text x="82" y="27" text-anchor="middle" class="box-title">Model Registry</text>
    </g>
    <g transform="translate(390,115)">
      <rect width="130" height="44" rx="12" fill="#FFFFFF" stroke="#FECACA"/><text x="65" y="20" text-anchor="middle" class="box-title">Evaluation</text><text x="65" y="36" text-anchor="middle" class="box-text">Audit trail</text>
    </g>
  </g>

  <path class="arrow" d="M1460 245 L1460 275"/>
  <path class="arrow" d="M475 380 L475 410"/>
  <path class="arrow" d="M590 535 L390 565"/>
  <path class="arrow" d="M590 535 L1110 565"/>
  <path class="arrow" d="M1300 535 L1300 565"/>
  <path class="arrow" d="M1265 535 C1265 560 740 540 620 565"/>
  <path class="arrow" d="M440 735 L360 765"/>
  <path class="arrow" d="M535 735 L500 765"/>
  <path class="arrow" d="M1260 735 L1270 765"/>
  <path class="dashed" d="M775 330 C980 345 1150 345 1270 410"/>
  <path class="dashed" d="M810 330 C1000 360 1240 700 1340 765"/>
  <path class="dashed" d="M760 650 C835 650 835 650 880 650"/>

  <g transform="translate(72,990)">
    <rect width="1558" height="62" rx="18" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="24" y="27" class="box-title">Scope note</text>
    <text x="24" y="47" class="box-text">The hackathon v0 implements the local-first investigation loop. Kafka, Flink, Snowflake, EKS, managed model serving, and enterprise governance become justified only after shared production scale is real.</text>
  </g>
</svg>
